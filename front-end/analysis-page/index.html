<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Vision Analytics</title>
    <link rel="stylesheet" href="/front-end/analysis-page/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>

<div class="header">
    <h1>Vision Analytics</h1>
</div>

<div class="header-actions left">
    <a href="/front-end/front-page/index.html" class="pill-btn">← Back to Eye Test</a>
</div>

<div class="page">

    <div class="stats-row">
        <div class="stat-card"><div class="stat-num" id="statTotal">—</div><div class="stat-label">Total Submissions</div></div>
        <div class="stat-card"><div class="stat-num" id="statAvg">—</div><div class="stat-label">Average Vision</div></div>
        <div class="stat-card"><div class="stat-num" id="statBest">—</div><div class="stat-label">Best Result</div></div>
        <div class="stat-card"><div class="stat-num" id="statWorst">—</div><div class="stat-label">Worst Result</div></div>
    </div>

    <div class="charts-grid">

        <div class="chart-box">
            <h3>Vision Distribution</h3>
            <canvas id="pieChart"></canvas>
        </div>

        <div class="chart-box">
            <h3>Results by Category</h3>
            <canvas id="barChart"></canvas>
        </div>

        <div class="chart-box wide">
            <h3>All Submissions</h3>
            <canvas id="lineChart"></canvas>
        </div>

    </div>

    <div class="table-box">
        <h3>Submission Log</h3>
        <table id="dataTable">
            <thead><tr><th>#</th><th>Name</th><th>Vision</th><th>Category</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

</div>

<script src="/front-end/analysis-page/script.js"></script>
</body>
</html>
